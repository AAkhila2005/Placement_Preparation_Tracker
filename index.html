<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Preparation Tracker | Akhila </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand mb-0 h1">
                🎯 Placement Preparation Tracker
            </span>
        </div>
    </nav>

    <!-- Dashboard Cards -->
    <div class="container mt-4">

        <div class="row">

            <div class="col-md-4 mb-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h5>💻 DSA Solved</h5>
                        <h2 id="dsaCount">0</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-4 mb-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h5>🧠 Aptitude Topics</h5>
                        <h2 id="aptitudeCount">0</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-4 mb-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h5>📘 Core Subjects</h5>
                        <h2 id="coreSubjectCount">0</h2>
                    </div>
                </div>
            </div>

        </div>

        <!-- Add Progress Form -->
        <div class="card mt-4">
            <div class="card-body">

                <h4>Add Progress</h4>

                <form>

                    <div class="mb-3">
                        <label class="form-label">Topic Name</label>
                        <input type="text" class="form-control" id="topic">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select class="form-select" id="category">
                            <option>DSA</option>
                            <option>Aptitude</option>
                            <option>Core Subject</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Problems Solved</label>
                        <input type="number" class="form-control" id="solved">
                    </div>

                    <button type="button" class="btn btn-primary" id="saveBtn">
                        Save Progress
                    </button>

                </form>

            </div>
        </div>
         
    <div class="card mt-4">
        <div class="card-body">

          <h4>📊 Progress Analytics</h4>

          <!-- Chart Legend -->
           <div class="text-center mb-3">
            <span style="color:#dd396a;font-weight:600;">● DSA</span>
            &nbsp;&nbsp;&nbsp;
            <span style="color:#ea739b;font-weight:600;">● Aptitude</span>
            &nbsp;&nbsp;&nbsp;
            <span style="color:#e9b2c4;font-weight:600;">● Core Subject</span>
          </div>

        <canvas id="progressChart"></canvas>

    </div>
</div>
        <!-- Progress Records -->
        <div class="card mt-4 mb-5">
            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-3">

                    <h4 class="mb-0">📋 Progress Records</h4>

                    <button class="btn btn-success" id="exportBtn">
                          📥 Export CSV
                    </button>

                </div>

                <div class="row mb-3">

                    <div class="col-md-6">

                        <input
                            type="text"
                            class="form-control"
                            id="searchInput"
                            placeholder="🔍 Search by Topic..."
                            onkeyup="displayRecords()">

                </div>

                <div class="col-md-6">

                     <select
                         class="form-select"
                         id="filterCategory"
                         onchange="displayRecords()">

                        <option value="All">All Categories</option>
                        <option value="DSA">DSA</option>
                        <option value="Aptitude">Aptitude</option>
                        <option value="Core Subject">Core Subject</option>

                      </select>

                </div>

</div>

                <table class="table table-striped">

                    <thead>
                        <tr>
                            <th>Topic</th>
                            <th>Category</th>
                            <th>Solved</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody id="tableBody">
                    </tbody>

                </table>

            </div>
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
<footer class="text-center py-3 mt-5">
    Made with ❤️ by Akhila
</footer>

</body>
</html>
